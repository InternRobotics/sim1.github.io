<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" overflow="visible">
  <defs>
    <!-- Matches nav-demo-btn: rgba(52,112,235) → rgba(126,78,236), 135deg -->
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3470eb"/>
      <stop offset="100%" stop-color="#7e4eec"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <filter id="glow" x="-55%" y="-55%" width="210%" height="210%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b1"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.75" result="f1"/>
      <feComposite in="f1" in2="b1" operator="in" result="s1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.4" result="b2"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.5" result="f2"/>
      <feComposite in="f2" in2="b2" operator="in" result="s2"/>
      <feMerge>
        <feMergeNode in="s2"/>
        <feMergeNode in="s1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Geometry centered in 64×64: (64−56)/2 = 4 -->
  <g id="tile">
    <rect x="4" y="4" width="56" height="56" rx="14" fill="#090b12"/>
    <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#face)"/>
    <rect x="7" y="7" width="50" height="50" rx="11" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#sheen)"/>
    <rect x="6" y="6" width="52" height="52" rx="12" fill="none" stroke="rgba(138,171,255,0.35)" stroke-width="1" opacity="0.9"/>
  </g>

  <!-- True canvas center (32,32); caps look slightly high with middle baseline → tiny +y nudge -->
  <g transform="translate(32, 32.75)">
    <text
      x="0"
      y="0"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="40"
      font-weight="700"
      letter-spacing="0.35"
      fill="url(#mark)"
      filter="url(#glow)"
    >S1</text>
  </g>
</svg>
